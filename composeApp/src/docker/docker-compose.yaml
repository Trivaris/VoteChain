version: '2.2'

networks:
  votechain:

services:

  ca.org1.votechain.com:
    image: hyperledger/fabric-ca:1.4.9
    container_name: ca.org1.votechain.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - 7054:7054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/peerOrganizations/org1.votechain.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - votechain

  ca.org2.votechain.com:
    image: hyperledger/fabric-ca:1.4.9
    container_name: ca.org2.votechain.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - 8054:8054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/peerOrganizations/org2.votechain.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - votechain

  orderer.votechain.com:
    image: hyperledger/fabric-orderer:2.2
    container_name: orderer.votechain.com
    environment:
      - ORDERER_GENERAL_LOGLEVEL=info
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    volumes:
      - ../crypto-config/ordererOrganizations/votechain.com/orderers/orderer.votechain.com/msp:/var/hyperledger/orderer/msp
      - ../crypto-config/ordererOrganizations/votechain.com/orderers/orderer.votechain.com/tls:/var/hyperledger/orderer/tls
      - ./system-genesis-block/genesis.block:/var/hyperledger/orderer/genesis.block
    ports:
      - 7050:7050
    networks:
      - votechain

  peer0.org1.votechain.com:
    image: hyperledger/fabric-peer:2.2
    container_name: peer0.org1.votechain.com
    environment:
      - CORE_PEER_ID=peer0.org1.votechain.com
      - CORE_PEER_ADDRESS=peer0.org1.votechain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.votechain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.votechain.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.votechain.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
    volumes:
      - ../crypto-config/peerOrganizations/org1.votechain.com/peers/peer0.org1.votechain.com/msp:/var/hyperledger/peer/msp
      - ../crypto-config/peerOrganizations/org1.votechain.com/peers/peer0.org1.votechain.com/tls:/var/hyperledger/peer/tls
    ports:
      - 7051:7051
      - 7052:7052
    networks:
      - votechain

  peer0.org2.votechain.com:
    image: hyperledger/fabric-peer:2.2
    container_name: peer0.org2.votechain.com
    environment:
      - CORE_PEER_ID=peer0.org2.votechain.com
      - CORE_PEER_ADDRESS=peer0.org2.votechain.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.votechain.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.votechain.com:8051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.votechain.com:8051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
    volumes:
      - ../crypto-config/peerOrganizations/org2.votechain.com/peers/peer0.org2.votechain.com/msp:/var/hyperledger/peer/msp
      - ../crypto-config/peerOrganizations/org2.votechain.com/peers/peer0.org2.votechain.com/tls:/var/hyperledger/peer/tls
    ports:
      - 8051:8051
      - 8052:8052
    networks:
      - votechain
