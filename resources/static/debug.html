<html>
<head>
  <title>Voting</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
</head>
<body>
<h1>Choose a Candidate</h1>
<form action="/debugSubmit" method="post">
  <label for="candidates">Choose a Candidate:</label>
  <select name="candidates" id="candidates">
    <option>Candidate 1</option>
    <option>Candidate 2</option>
    <option>Candidate 3</option>
  </select>
  <br>
  <label for="key">Key:</label>
  <input type="text" id="key" name="key" placeholder="Enter key">
  <br>
  <label for="notify">Add to others? </label>
  <input type="checkbox" id="notify" name="notify">
  <br>
  <button type="submit">Submit</button>
</form>
</body>
</html>
